<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="description" content="ParkiCare - 개인화된 파킨슨병 맞춤형 인지·운동 트레이닝 케어 시스템. 환자별 수행 데이터를 종합 분석하여 적합한 훈련을 제공합니다.">
  <meta name="theme-color" content="#fafafa">
  <meta property="og:title" content="ParkiCare - 파킨슨병 맞춤형 케어">
  <meta property="og:description" content="수행 데이터 분석을 바탕으로 당신의 취약 영역에 맞는 맞춤형 훈련을 제공합니다">
  <title>ParkiCare - 파킨슨병 맞춤형 케어 시스템</title>

  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  
  <link rel="stylesheet" href="css/style.css?v=8">

  
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90' fill='%234a90e2'>P</text></svg>">
</head>
<body>

  
  <main id="app-root" style="position:relative; z-index:1;">
    
    <div style="display:flex;align-items:center;justify-content:center;height:100vh;flex-direction:column;gap:16px;">
      <div style="font-size:32px;font-weight:bold;color:#4a90e2;animation:spin 1s linear infinite">P</div>
      <div style="color:#8a9ab8;font-size:14px;">로딩 중...</div>
    </div>
  </main>

  <style>
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>

  <link rel="stylesheet" href="https://pyscript.net/releases/2023.11.1/core.css" />
  <script type="module" src="https://pyscript.net/releases/2023.11.1/core.js"></script>

  <py-config>
    packages = []
    [[fetch]]
    files = [
      "./py_frontend/__init__.py",
      "./py_frontend/storage.py",
      "./py_frontend/games/__init__.py",
      "./py_frontend/games/memory_sequence.py",
      "./py_frontend/games/attention_stroop.py",
      "./py_frontend/games/motor_response.py"
    ]
  </py-config>
  
  <script type="py" src="./py_frontend/app.py"></script>

</body>
</html>
